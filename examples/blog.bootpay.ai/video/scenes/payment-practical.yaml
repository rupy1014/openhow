meta:
  id: "EP02"
  slug: "payment-practical"
  title: "결제, 개발팀한테 넘기기 전에 정리할 것들"
  created: "2026-03-23"

youtube:
  tags:
    - 결제 취소
    - 결제 환불
    - 취소 환불 차이
    - 결제 정산
    - 결제수단 선택
    - 카드 취소
    - 가상계좌 환불
    - PG 정산
    - 정산 주기
    - 결제 기획
    - 취소 환불 정책
    - 부분취소
    - 가상계좌
    - 간편결제
    - 휴대폰결제
    - 캐시플로우
    - 스타트업 결제
    - Bootpay
    - 부트페이
    - 결제 실무
    - 기획자
  description: |
    결제 도입은 했는데, 취소랑 환불 정책은 정했나요? 정산은 언제 들어오는지 알고 계신가요?
    취소(전산 되돌림)와 환불(직접 입금)의 차이, 결제수단 조합, 정산 주기까지 기획자가 반드시 알아야 할 실무를 정리했어요.

    이전 편: 결제 기획, 뭐부터 해야 하나요? [링크]
    📝 블로그 가이드: [링크]
    💬 도입 상담: https://bootpay.co.kr
  thumbnail_text: "개발팀한테 넘기기 전에 이거 정하세요"

bgm:
  - section: "훅"
    src: "/audio/bgm/tension-build.mp3"
    volume: 0.25
    fade_in_sec: 0.5
    fade_out_sec: 1.5
  - section: "아웃트로"
    src: "/audio/bgm/warm-ending.mp3"
    volume: 0.25
    fade_in_sec: 1.0
    fade_out_sec: 2.0

scenes:
  # ─────────────────────────────────────────────────────────────
  # 훅 (Hook)
  # ─────────────────────────────────────────────────────────────
  - id: hook-01
    section: 훅
    type: narration
    speaker: narrator
    tts: "고객이 돈 돌려달라고 했는데, 카드 결제는 피지 전산에서 취소 버튼 누르면 바로 되거든요."
    display_text: "고객이 돈 돌려달라고 했는데, 카드 결제는 PG 전산에서 취소 버튼 누르면 바로 되거든요."

  - id: hook-02
    section: 훅
    type: narration
    speaker: narrator
    tts: "근데 가상계좌로 결제한 고객은? 고객 계좌번호 받아서 직접 입금해야 돼요."
    display_text: "근데 가상계좌로 결제한 고객은? 고객 계좌번호 받아서 직접 입금해야 돼요."

  - id: hook-03
    section: 훅
    type: narration
    speaker: narrator
    tts: "같은 돈 돌려주기인데 하나는 취소고 하나는 환불이에요. 이 차이를 모르면 라이브 첫날부터 씨에스 터집니다."
    display_text: "같은 \"돈 돌려주기\"인데 하나는 취소고 하나는 환불이에요. 이 차이를 모르면 라이브 첫날부터 CS 터집니다."

  # ─────────────────────────────────────────────────────────────
  # 인트로
  # ─────────────────────────────────────────────────────────────
  - id: intro-01
    section: 인트로
    type: greeting
    speaker: narrator
    tts: "안녕하세요. 부트페이입니다. 지난 영상에서 결제 도입 전체 그림을 봤잖아요. 피지가 뭔지, 수수료는 어떻게 되는지, 심사는 어떻게 넘는지."
    display_text: "안녕하세요. 부트페이입니다. 지난 영상에서 결제 도입 전체 그림을 봤잖아요. PG가 뭔지, 수수료는 어떻게 되는지, 심사는 어떻게 넘는지."

  - id: intro-02
    section: 인트로
    type: narration
    speaker: narrator
    tts: "오늘은 그 다음 단계예요. 결제수단은 뭘 넣어야 하는지, 수단별로 취소랑 환불이 어떻게 다른지, 정산은 언제 들어오는지. 기획자가 개발팀한테 넘기기 전에 꼭 정해야 하는 것들을 정리해볼게요."
    display_text: "오늘은 그 다음 단계예요. 결제수단은 뭘 넣어야 하는지, 수단별로 취소랑 환불이 어떻게 다른지, 정산은 언제 들어오는지."

  # ─────────────────────────────────────────────────────────────
  # 본론 1: 결제수단
  # ─────────────────────────────────────────────────────────────
  - id: method-01
    section: 본론
    type: narration
    speaker: narrator
    tts: "결제수단이 종류가 많잖아요. 신용카드, 체크카드, 간편결제, 계좌이체, 가상계좌, 휴대폰결제. 근데 제 경험상 처음부터 가능한 한 많이 넣는 게 좋아요. 나중에 추가하려면 또 심사받고 개발해야 하거든요."
    display_text: "결제수단이 종류가 많잖아요. 신용카드, 체크카드, 간편결제, 계좌이체, 가상계좌, 휴대폰결제."
    highlight: "처음부터 가능한 한 많이 넣는 게 좋아요"

  - id: method-02
    section: 본론
    type: narration
    speaker: narrator
    tts: "그리고 결제수단이 없어서 이탈하는 고객은 다시 안 옵니다. 하나씩 짚어볼게요."
    display_text: "결제수단이 없어서 이탈하는 고객은 다시 안 옵니다."
    highlight: "다시 안 옵니다"

  - id: method-03
    section: 본론
    type: comparison
    speaker: narrator
    tts: "먼저 신용카드. 온라인 결제의 기본이에요. 이건 무조건 넣어야 해요. 결제 비중도 가장 높고, 할부도 되고, 취소도 제일 간단하거든요."
    display_text: "신용카드 — 온라인 결제의 기본"
    items:
      - name: "신용카드"
        desc: "기본, 할부 가능, 취소 간편"

  - id: method-04
    section: 본론
    type: narration
    speaker: narrator
    tts: "간편결제. 카카오페이, 네이버페이, 토스페이 같은 거요. 카드 번호 안 넣어도 되니까 전환율이 확 올라요. 특히 모바일 결제 비중이 높은 서비스라면 필수예요."
    display_text: "간편결제 — 카카오페이, 네이버페이, 토스페이"
    highlight: "전환율이 확 올라요"

  - id: method-05
    section: 본론
    type: narration
    speaker: narrator
    tts: "근데 간편결제는 계약 방식이 두가지가 있어요."
    display_text: "간편결제 계약 방식: 리셀 vs 직가맹"

  - id: method-06
    section: 본론
    type: narration
    speaker: narrator
    tts: "하나는 피지 리셀 방식. 피지사랑 계약할 때 간편결제도 같이 신청하는 거예요. 별도 계약이나 보증보험이 필요 없고, 정산도 피지사에서 한번에 받아요. 편하죠. 근데 단점이 있어요. 구매자 혜택이나 프로모션을 못 걸어요. 그리고 간편결제 정기결제도 안 돼요."
    display_text: "PG 리셀 방식 — 별도 계약 불필요, 정산 일괄"

  - id: method-07
    section: 본론
    type: narration
    speaker: narrator
    tts: "다른 하나는 직가맹 방식. 카카오페이, 네이버페이 같은 간편결제사랑 직접 계약하는 거예요. 프로모션도 걸 수 있고, 간편결제 정기결제도 가능해요."
    display_text: "직가맹 방식 — 간편결제사와 직접 계약"

  - id: method-08
    section: 본론
    type: narration
    speaker: narrator
    tts: "근데 직가맹은 비용이 더 싸서 가는 게 아니에요. 오히려 비쌀 수 있어요."
    display_text: "직가맹은 비용이 더 싸서 가는 게 아니에요"
    highlight: "오히려 비쌀 수 있어요"

  - id: method-09
    section: 본론
    type: comparison
    speaker: narrator
    tts: "많이들 오해하는 게, 직가맹하면 수수료가 내려간다고 생각하시거든요. 건당 수수료율은 좀 낮아질 수 있어요. 근데 직가맹하려면 간편결제사마다 보증보험에 가입해야 하고, 정산도 각각 따로 받아야 하고, 계약이랑 심사도 별도로 해야 해요. 총비용으로 따지면 리셀이랑 비슷하거나 오히려 더 비싸요."
    display_text: "직가맹 vs 리셀 — 비용이 아니라 기능 차이"
    items:
      - name: "리셀"
        desc: "편함, 총비용 유리, 프로모션 불가"
      - name: "직가맹"
        desc: "보증보험+별도정산, 프로모션 가능"

  - id: method-10
    section: 본론
    type: narration
    speaker: narrator
    tts: "그러면 왜 직가맹을 하냐? 결국 구매자 혜택 때문이에요. 카카오페이 할인 이벤트, 네이버페이 포인트 적립, 간편결제 정기결제 같은 거요. 리셀로는 이런 게 안 돼요. 직가맹해야 구매자한테 혜택을 줄 수 있어요."
    display_text: "직가맹 = 구매자 혜택 (프로모션, 정기결제)"
    highlight: "구매자 혜택"

  - id: method-11
    section: 본론
    type: narration
    speaker: narrator
    tts: "그래서 초기에는 리셀로 시작하되, 거래 볼륨이 커지면 직가맹으로 가는 게 맞아요. 볼륨이 크면 구매자 혜택이 전환율에 직접 영향을 주거든요."
    display_text: "초기 리셀 → 볼륨 커지면 직가맹 전환"

  - id: method-12
    section: 본론
    type: narration
    speaker: narrator
    tts: "계좌이체. 카드가 없는 고객을 위한 거예요. 실시간으로 결제가 되고, 피지 전산에서 취소도 돼요. 이건 뒤에서 자세히 이야기할게요."
    display_text: "계좌이체 — 실시간 결제, PG 전산 취소 가능"

  - id: method-13
    section: 본론
    type: narration
    speaker: narrator
    tts: "가상계좌. 고액 결제에서 많이 써요. 비투비 서비스나 교육비, 수강료 같은 데서요. 입금 전용 계좌번호를 발급해주는 건데, 고객이 직접 이체를 해야 하니까 결제 완료까지 시간이 걸려요. 미입금 관리를 따로 해줘야 해요."
    display_text: "가상계좌 — B2B, 교육비 등 고액 결제"

  - id: method-14
    section: 본론
    type: narration
    speaker: narrator
    tts: "휴대폰 결제. 소액 결제에 많이 써요. 디지털 콘텐츠나 인앱 결제에서 특히 많고요. 통신사 요금에 합산해서 청구되니까 카드가 없는 고객, 특히 십대나 이십대 초반 사용자가 많은 서비스라면 꼭 넣어야 해요. 다만 월 결제 한도가 있고, 수수료가 카드보다 좀 높은 편이에요."
    display_text: "휴대폰 결제 — 소액, 10~20대, 통신사 청구"

  - id: method-15
    section: 본론
    type: comparison
    speaker: narrator
    tts: "업종별로 추천 조합이 있긴 한데요, 사실 가능하면 처음부터 다 넣는 걸 추천해요. 카드, 간편결제, 계좌이체, 가상계좌, 휴대폰결제. 피지사 계약할 때 한번에 신청하면 되니까 추가 비용이 거의 없어요."
    display_text: "업종별 추천 결제수단 조합"
    items:
      - name: "카드"
        desc: "필수"
      - name: "간편결제"
        desc: "필수"
      - name: "계좌이체"
        desc: "권장"
      - name: "가상계좌"
        desc: "B2B 필수"
      - name: "휴대폰"
        desc: "소액/젊은층"

  - id: method-16
    section: 본론
    type: narration
    speaker: narrator
    tts: "나중에 하나씩 추가하면 그때마다 심사받고 개발팀한테 또 요청해야 하거든요. 굳이 뺄 거 하나 고르라면, 비투비 서비스에서는 휴대폰결제가 거의 안 쓰이고, 비투씨에서는 가상계좌가 덜 쓰이는 정도예요."
    display_text: "B2B → 휴대폰결제 거의 미사용 / B2C → 가상계좌 덜 사용"

  - id: method-17
    section: 본론
    type: quote
    speaker: narrator
    tts: "근데 넣어놓고 안 쓰이는 건 괜찮은데, 안 넣어서 고객이 이탈하면 그건 매출 손실이에요."
    display_text: "넣어놓고 안 쓰이는 건 괜찮은데, 안 넣어서 고객이 이탈하면 그건 매출 손실이에요."

  - id: method-tip
    section: 본론
    type: quote
    speaker: narrator
    tts: "간편결제는 리셀로 시작하세요. 직가맹은 수수료가 싸서 가는 게 아니라, 구매자 혜택 때문에 가는 거예요. 거래 볼륨이 커지면 직가맹으로 전환하는 게 맞고요. 그리고 결제수단은 나중에 추가보다 처음부터 다 넣기가 정답이에요."
    display_text: "💡 삽질 포인트: 간편결제는 리셀로 시작 → 볼륨 커지면 직가맹 전환"

  # ─────────────────────────────────────────────────────────────
  # 본론 2: 취소 vs 환불
  # ─────────────────────────────────────────────────────────────
  - id: cancel-01
    section: 본론
    type: narration
    speaker: narrator
    tts: "자, 이게 오늘 제일 중요한 파트예요. 먼저 용어부터 구분할게요."
    display_text: "취소 ≠ 환불"
    highlight: "제일 중요한 파트"

  - id: cancel-02
    section: 본론
    type: comparison
    speaker: narrator
    tts: "취소는 피지사 전산에서 원래 결제를 되돌리는 거예요. 카드 승인취소, 매입취소 같은 거요. 시스템이 알아서 처리해줘요."
    display_text: "취소 = PG 전산에서 되돌림 (시스템 처리)"
    items:
      - name: "취소"
        desc: "PG 전산 되돌림, 시스템 자동 처리"

  - id: cancel-03
    section: 본론
    type: narration
    speaker: narrator
    tts: "환불은 우리가 고객 계좌로 직접 돈을 보내는 거예요. 가상계좌처럼 자동 취소가 안 되는 결제수단에서 이렇게 해야 해요."
    display_text: "환불 = 고객 계좌로 직접 입금"
    items:
      - name: "환불"
        desc: "고객 계좌로 직접 송금, 수동 처리"

  - id: cancel-04
    section: 본론
    type: narration
    speaker: narrator
    tts: "이 차이를 모르고 기획하면 라이브 후에 난리 납니다."
    display_text: "이 차이를 모르면 라이브 후에 난리 납니다"

  - id: cancel-05
    section: 본론
    type: flow
    speaker: narrator
    tts: "먼저 카드 결제. 이건 취소예요. 이게 제일 심플해요. 당일 취소면 승인취소가 돼서, 카드 매출 자체가 없었던 걸로 처리돼요. 고객 카드 명세서에도 안 찍혀요."
    display_text: "카드 결제 취소 — 당일이면 승인취소"
    steps:
      - "당일 취소 → 승인취소 (매출 자체 없었던 것)"
      - "명세서에 안 찍힘"

  - id: cancel-06
    section: 본론
    type: narration
    speaker: narrator
